<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4CC9F0"/>
      <stop offset="55%" stop-color="#3A86FF"/>
      <stop offset="100%" stop-color="#2D6CDF"/>
    </linearGradient>
    <mask id="sCut" x="0" y="0" width="300" height="300" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="300" height="300" fill="white"/>
      <!-- Center notch -->
      <rect x="92" y="142" width="140" height="18" rx="9" fill="black"/>
      <!-- Small cut on the right edge -->
      <circle cx="228" cy="132" r="11" fill="black"/>
    </mask>
  </defs>

  <!-- Icon: stylized S -->
  <g mask="url(#sCut)">
    <text x="40" y="215" font-family="Poppins, Montserrat, Arial, sans-serif" font-size="220" font-weight="700" fill="url(#sGradient)">S</text>
  </g>

  <!-- Wordmark -->
  <text x="240" y="200" font-family="Poppins, Montserrat, Arial, sans-serif" font-size="120" font-weight="700" fill="#7B2CBF">smisthsons</text>
</svg>
